provider:
  name: panther
resources:
  httpsource:
    create:
      path: /log-sources/http
      method: POST
    read:
      path: /log-sources/http/{id}
      method: GET
    update:
      path: /log-sources/http/{id}
      method: PUT
    delete:
      path: /log-sources/http/{id}
      method: DELETE
    schema:
      ignores:
        - integrationId
  pubsubsource:
    create:
      path: /log-sources/pubsub
      method: POST
    read:
      path: /log-sources/pubsub/{id}
      method: GET
    update:
      path: /log-sources/pubsub/{id}
      method: PUT
    delete:
      path: /log-sources/pubsub/{id}
      method: DELETE
    schema:
      ignores:
        - integrationId
  gcssource:
    create:
      path: /log-sources/gcs
      method: POST
    read:
      path: /log-sources/gcs/{id}
      method: GET
    update:
      path: /log-sources/gcs/{id}
      method: PUT
    delete:
      path: /log-sources/gcs/{id}
      method: DELETE
    schema:
      ignores:
        - integrationId
  log_source_alarm:
    create:
      path: /log-source-alarms/{sourceId}/{type}
      method: PUT
    read:
      path: /log-source-alarms/{sourceId}/{type}
      method: GET
    update:
      path: /log-source-alarms/{sourceId}/{type}
      method: PUT
    delete:
      path: /log-source-alarms/{sourceId}/{type}
      method: DELETE
    schema:
      ignores:
        # runtime observability, not configuration — see the "Runtime state not exposed"
        # row in the PR description
        - state
  aws_cloud_account:
    create:
      path: /cloud-accounts/aws
      method: POST
    read:
      path: /cloud-accounts/aws/{id}
      method: GET
    update:
      path: /cloud-accounts/aws/{id}
      method: PUT
    delete:
      path: /cloud-accounts/aws/{id}
      method: DELETE
    schema:
      ignores:
        - integrationId
  user:
    create:
      path: /users
      method: POST
    read:
      path: /users/{id}
      method: GET
    update:
      path: /users/{id}
      method: POST
    delete:
      path: /users/{id}
      method: DELETE
    schema:
      ignores:
        - id
  role:
    create:
      path: /roles
      method: POST
    read:
      path: /roles/{id}
      method: GET
    update:
      path: /roles/{id}
      method: POST
    delete:
      path: /roles/{id}
      method: DELETE
    schema:
      ignores:
        - id
