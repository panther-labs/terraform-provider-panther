provider:
  name: panther
resources:
  httpsource:
    create:
      path: /log-sources/http
      method: POST
    read:
      path: /log-sources/http/{id}
      method: GET
    update:
      path: /log-sources/http/{id}
      method: PUT
    delete:
      path: /log-sources/http/{id}
      method: DELETE
    schema:
      ignores:
        - integrationId
  pubsubsource:
    create:
      path: /log-sources/pubsub
      method: POST
    read:
      path: /log-sources/pubsub/{id}
      method: GET
    update:
      path: /log-sources/pubsub/{id}
      method: PUT
    delete:
      path: /log-sources/pubsub/{id}
      method: DELETE
    schema:
      ignores:
        - integrationId
  gcssource:
    create:
      path: /log-sources/gcs
      method: POST
    read:
      path: /log-sources/gcs/{id}
      method: GET
    update:
      path: /log-sources/gcs/{id}
      method: PUT
    delete:
      path: /log-sources/gcs/{id}
      method: DELETE
    schema:
      ignores:
        - integrationId
  log_source_alarm:
    create:
      path: /log-source-alarms/{sourceId}/{type}
      method: PUT
    read:
      path: /log-source-alarms/{sourceId}/{type}
      method: GET
    update:
      path: /log-source-alarms/{sourceId}/{type}
      method: PUT
    delete:
      path: /log-source-alarms/{sourceId}/{type}
      method: DELETE
    schema:
      ignores:
        # runtime observability, not configuration — see the "Runtime state not exposed"
        # row in the PR description
        - state
  aws_cloud_account:
    create:
      path: /cloud-accounts/aws
      method: POST
    read:
      path: /cloud-accounts/aws/{id}
      method: GET
    update:
      path: /cloud-accounts/aws/{id}
      method: PUT
    delete:
      path: /cloud-accounts/aws/{id}
      method: DELETE
    schema:
      ignores:
        - integrationId
  rule:
    create:
      path: /rules
      method: POST
    read:
      path: /rules/{id}
      method: GET
    update:
      path: /rules/{id}
      method: PUT
    delete:
      path: /rules/{id}
      method: DELETE
    schema:
      ignores:
        - id
  policy:
    create:
      path: /policies
      method: POST
    read:
      path: /policies/{id}
      method: GET
    update:
      path: /policies/{id}
      method: PUT
    delete:
      path: /policies/{id}
      method: DELETE
    schema:
      ignores:
        - id
  scheduled_rule:
    create:
      path: /scheduled-rules
      method: POST
    read:
      path: /scheduled-rules/{id}
      method: GET
    update:
      path: /scheduled-rules/{id}
      method: PUT
    delete:
      path: /scheduled-rules/{id}
      method: DELETE
    schema:
      ignores:
        - id
  simple_rule:
    create:
      path: /simple-rules
      method: POST
    read:
      path: /simple-rules/{id}
      method: GET
    update:
      path: /simple-rules/{id}
      method: PUT
    delete:
      path: /simple-rules/{id}
      method: DELETE
    schema:
      ignores:
        - id
